version: '3'

services:
  db:
    image: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - celery

  celery:
    build: .
    command: celery -A stageit worker -l info
    depends_on:
      - db
      - rabbit

  rabbit:
    image: rabbitmq:3

volumes:
  postgres-data: