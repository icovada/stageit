version: '3'

services:
  db:
    image: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
  celery:
    build: .
    command: celery -A stageit worker -l info
    depends_on:
      - db
      - rabbit
  rabbit:
    image: rabbitmq:3

volumes:
  postgres-data: