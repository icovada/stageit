{% extends "templates/layout.html" %}

{% block title %}Templates{% endblock %}
{% block header %}Templates{% endblock %}

{% block body %}
<header class="jumbotron">
    <div class="container-lg">
        <div class="row">
            <div class="col-xs-12">
                <h2>Templates</h2>
            </div>
        </div>
    </div>
</header>

<div class="content-area">
    <div class="container-lg">
        <div class="row">
            <div class="col-xs-12">
                <table id="templates" class="table" width="100%">
            </div>
        </div>
    </div>
</div>


{% endblock %}

{% block script %}
<script>

    $(document).ready(function () {
        var dataSet = $.getJSON({
            url: '/api/tables?table=templates',
            async: false
        }).responseJSON.data;
        $('#templates').DataTable({
            data: dataSet,
            columns: [
                { title: "ID" },
                { title: "Name" },
                { title: "Description" }
            ]
        });
    });

    $('#deletetemplate').on('click', function (event) {
        var a = confirm("Confirm deletion");
        if (a == true) {
            $.ajax({
                type: 'DELETE',
                url: "/api/templates/" + $(this).attr("templateid"),
            }).done(function (response) {
                location.reload();
            }).fail(function (response) {
                alert(response.responseJSON.message)
            })
        }
    });

</script>
{% endblock %}
