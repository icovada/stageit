{% extends "layout.html" %}

{% block navbar %}
<a class="nav-item nav-link" href="/workers">Workers</a>
<a class="nav-item nav-link" href="/tasks">Tasks</a>
<a class="nav-item nav-link active" href="/templates">Templates</a>
{% endblock %}


{% block body %}
<h1 class="container col col-xl-8 mb-3 mt-3 md-auto display-4">Template List   <a class="btn btn-success btn-primary" role="button" href="/templates/add">Add new</button></a></h1>
<div class="container col col-xl-8 justify-content-center pb-5">
<table class="table">
    <thead>
      <tr>
        {% for col in header%}
        <th scope="col">{{col}}</th>
        {% endfor %}
        <th scope="col">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for row in table %}
      <tr>
        <th scope="row"><a href="/templates/{{row[0]}}">{{row[1]}}</a></th>
        <td>{{row[1]}}</td>
        <td><a role="button" class="btn btn-success btn-sm" href="/templates/{{row[0]}}/create">Create task</a> <a type="button" class="btn btn-danger btn-sm" href="/templates/{{row[0]}}/delete">Delete</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  </div>
{% endblock %}
