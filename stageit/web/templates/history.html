{% extends "templates/layout.html" %}

{% block title %}Task History{% endblock %}
{% block header %}Task History{% endblock %}

{% block body %}
<header class="jumbotron">
    <div class="container-lg">
        <div class="row">
            <div class="col-xs-12">
                <h2>History</h2>
            </div>
        </div>
    </div>
</header>
<div class="container-xl">
    <div class="table-responsive scrollbars">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Serial</th>
                    <th scope="col">Model</th>
                    <th scope="col">Description</th>
                </tr>
            </thead>
            <tbody>
                {% for row in table %}
                <tr>
                    <th scope="row"><a href="/history/{{row[0]}}">{{row[0][:5]}}</a></th>
                    <td>{{row[1]}}</td>
                    <td>{{row[2]}}</td>
                    <td>{{row[3]}}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
