{% extends "templates/layout.html" %}

{% block title %}Task History{% endblock %}
{% block header %}Task History{% endblock %}

{% block body %}
<div class="container col col-xl-8 justify-content-center pb-5">
    <table class="table table-striped">
        <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Serial</th>
                <th scope="col">Model</th>
                <th scope="col">Description</th>
            </tr>
        </thead>
        <tbody>
            {% for row in table %}
            <tr>
                <th scope="row"><a href="/history/{{row[0]}}">{{row[0][:5]}}</a></th>
                <td>{{row[1]}}</td>
                <td>{{row[2]}}</td>
                <td>{{row[3]}}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
