{% extends "layout.html" %}

{% block navbar %}
<a class="nav-item nav-link" href="/workers">Workers</a>
<a class="nav-item nav-link" href="/tasks">Tasks</a>
<a class="nav-item nav-link" href="/templates">Templates</a>
{% endblock %}


{% block body %}
<h1 class="container col col-xl-8 mb-3 mt-3 md-auto display-4">Create task from {{template.name}}</h1>
<div class="container col col-xl-8 justify-content-center pb-5">
    <form class="needs-validation" action="/templates/{{uuid}}/add" id="taskform" method="post">
        <div class="form-group mb-3">
            <label for="description">Description</label>
            <input type="text" class="form-control" id="description" required>
        </div>
        <div class="form-group col-xl-6 mb-3">
            <label for="templatevalues">Template values</label>
            <textarea class="form-control text-monospace" id="templatevalues" rows="6"
                aria-describedby="templatevaluesHelp">{{templatevalues}}</textarea>
            <small id="templatevaluesHelp" class="form-text text-muted">Insert variables required by your task in
                yaml format</small>
        </div>
        <hr class="mb-4">
        <button class="btn btn-primary btn-lg btn-block" type="submit">Create task</button>
    </form>
</div>

{% endblock %}
