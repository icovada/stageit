<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,900&display=swap">

    <!-- Basecoat CSS -->
    <link rel="stylesheet" href="https://basecoat.cdn.dimensiondata.com/latest/css/ntt.basecoat.min.css">

    <!-- Your app specific CSS file(s) -->
    <!-- link rel="stylesheet" href="css/app.css" -->

    <!-- Basecoat favicon/icons -->
    <link rel="apple-touch-icon" sizes="180x180"
        href="https://basecoat.cdn.dimensiondata.com/latest/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32"
        href="https://basecoat.cdn.dimensiondata.com/latest/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16"
        href="https://basecoat.cdn.dimensiondata.com/latest/img/favicon/favicon-16x16.png">
    <link rel="mask-icon" href="https://basecoat.cdn.dimensiondata.com/latest/img/favicon/safari-pinned-tab.svg"
        color="#0033cc">
    <link rel="shortcut icon" href="https://basecoat.cdn.dimensiondata.com/latest/img/favicon/favicon.ico">
    <meta name="theme-color" content="#ffffff">

    <title>StageIT</title>
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-dark py-0" style="background-color: #455565">
        <a class="navbar-brand row py-2 px-4" href="/" style="background-color: #69be28;">
            <img src="https://www.dimensiondata.com/Areas/DDCorporate/assets/images/brand/logo-dimension-data.svg"
                height="26" class="pr-3" alt="">StageIT
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup"
            aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a class="nav-item nav-link {% if navbar == 'worker' %}active{% endif %}" href="/workers">Workers</a>
                <a class="nav-item nav-link {% if navbar == 'task' %}active{% endif %}" href="/tasks">Tasks</a>
                <a class="nav-item nav-link {% if navbar == 'template' %}active{% endif %}"
                    href="/templates">Templates</a>
                <a class="nav-item nav-link {% if navbar == 'history' %}active{% endif %}" href="/history">History</a>
            </div>
        </div>
    </nav>

    {% block body %}
    <div class="container">
        <div class="jumbotron">
            <h1 class="display-4">StageIT</h1>
            <p class="lead">Automate your deploy</p>
        </div>
    </div>
    {% endblock %}


    <!-- jQuery from CDN -->
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>

    <!-- Basecoat JS -->
    <script src="https://basecoat.cdn.dimensiondata.com/latest/js/dd.basecoat.min.js"></script>

    <!-- Your app specific JS file(s) -->
    <!-- script src="js/app.js"></script -->

    <!-- Basecoat outdated browser JS -->
    <script defer src="https://basecoat.cdn.dimensiondata.com/latest/js/outdated-browser.min.js"></script>
    {% block script %}{% endblock %}
</body>

</html>
