<!DOCTYPE html>
<html class="desktop-menu-open" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Home | Style Guide</title>
    <!-- meta name="description" content="Description of the page less than 150 characters" -->
    <!-- meta description -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,900&display=swap">
    <link rel="stylesheet" href="https://basecoat.cdn.dimensiondata.com/3.0.10/css/ntt.basecoat.min.css">
    <link rel="stylesheet" href="/static/css/stageit.css"> <!-- your own stylesheet here -->
    <link rel="apple-touch-icon" sizes="180x180"
        href="https://basecoat.cdn.dimensiondata.com/3.0.10/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32"
        href="https://basecoat.cdn.dimensiondata.com/3.0.10/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16"
        href="https://basecoat.cdn.dimensiondata.com/3.0.10/img/favicon/favicon-16x16.png">
    <link rel="mask-icon" href="https://basecoat.cdn.dimensiondata.com/3.0.10/img/favicon/safari-pinned-tab.svg"
        color="#0033cc">
    <link rel="shortcut icon" href="https://basecoat.cdn.dimensiondata.com/3.0.10/img/favicon/favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
</head>




<body>

    <div class="desktop-menu-layout mobile-menu-layout sticky-footer-layoutt">

        <div class="desktop-menu">
            <div class="accordion-menu">
                <nav class="scrollbars scrollbars-light">
                    <ul class="nav" data-accordion-group>
                        <li><a class="nav-item nav-link {% if navbar == 'worker' %}active{% endif %}"
                                href="/workers">Workers</a></li>

                        <li><a class="next collapsed" data-toggle="collapse">Tasks</a>
                            <ul class="collapse">
                                <li><a href="/tasks">Task List</a></li>
                                <li><a href="/templates">Task Templates</a></li>
                                <li><a href="/history">Task History</a></li>
                            </ul>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

        <header class="site-header">
            <nav class="navbar navbar-fixed-top">
                <!-- Left utility nav -->
                <ul class="nav navbar-nav navbar-left">
                    <!-- Desktop menu toggle -->
                    <li class="desktop-menu-toggle hidden-mobile">
                        <a href="#" data-toggle="desktop-menu" title="Desktop menu">
                            <div class="hidden-closed">Close</div>
                            <div class="hidden-opened"></div>
                        </a>
                    </li>
                    <li>
                        <!-- Company logo -->
                        <a class="horizontal-logo" href="/" title="Return home">
                            <div class="logo-image" title="NTT"></div>
                            <div class="logo-title"><span>Stage<br>it!</span></div>
                        </a>
                    </li>
                </ul>
            </nav>
        </header>

        <main class="page-wrapper">
            {% block body %}{% endblock %}
        </main>

    </div>


    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://basecoat.cdn.dimensiondata.com/3.0.10/js/dd.basecoat.min.js"></script>
    <!-- script src="js/app.min.js"></script -->
    <!-- your own script here -->
    <script defer src="https://basecoat.cdn.dimensiondata.com/3.0.10/js/outdated-browser.min.js"></script>
    {% block script %}{% endblock %}
</body>

</html>
