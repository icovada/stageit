{% extends "stageit/layout.html" %}

{% block title %}Add Bootstrap config | {% endblock %}

{% block body %}
<div class="top-gutter bottom-gutter container-wrapper">
    <div class="content-area">
        <div class="container-lg">

            <form class="needs-validation" action="/api/bootstrapconfig/" id="taskform" method="post">
                <div class="form-group">
                    <h2>Insert new Bootstrap config</h2>
                </div>
                {% csrf_token %}


                <div class="form-group">
                    <div class="form-row">
                        <div class="form-group col-xl-6 form-left">
                            <label class="control-label" for="name">Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="form-group col-xl-6 form-right">
                            <label for="description">Description</label>
                            <input type="text" class="form-control" id="description" required>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-xl-6 form-left">
                        <label for="template">Bootstrap Template</label>
                        <textarea class="form-control font-monospace" id="template" rows="20"
                            aria-describedby="templateHelp">{{bootstrapconfig}}</textarea>
                        <small id="templateHelp" class="form-text text-muted"></small>
                    </div>
                    <div class="form-group col-xl-6 form-right">
                        <label for="taskvalues">Template values</label>
                        <textarea class="form-control font-monospace" id="templatevalues" rows="20"
                            aria-describedby="taskvaluesHelp">{{values}}</textarea>
                        <small id="taskvaluesHelp" class="form-text text-muted">Insert variables required by your
                            template
                            in
                            yaml format</small>
                    </div>
                </div>
                <button class="btn btn-primary" type="button" data-toggle="modal"
                    data-target="#templaterender">Test</button>
                <div class="modal fade" tabindex="-1" role="dialog" id="templaterender">
                    <div class="modal-dialog modal-xl" role="document">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Rendered template</h5>
                            </div>
                            <div class="modal-body">
                                <pre><code id="templaterenderview"></code></pre>
                            </div>
                            <div class="modal-footer">
                                <!-- use the .btn-link-toolbar for the correct padding if the footer only contains link buttons -->
                                <div class="btn-link-toolbar">
                                    <button type="button" class="btn btn-link" data-dismiss="modal">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <hr class="mb-4">
                <button class="btn btn-primary btn-lg btn-block" type="button" , id=createbutton>Create config</button>
                <div id="submitalertspace" class="my-3"></div>
            </form>
        </div>
    </div>
</div>


{% endblock %}

{% block script %}
<script src="/static/js/templaterender.js"></script>
<script>
    $('#createbutton').on('click', function (event) {
        event.preventDefault();
        $.ajax({
            type: 'POST',
            url: $('#taskform').attr('action'),
            beforeSend: function(request) {
                request.setRequestHeader("X-CSRFToken", getCookie('csrftoken'));
            },
            data: {
                name: $('#name').val(),
                description: $('#description').val(),
                bootstraptemplate: $('#template').val(),
                values: JSON.stringify(jsyaml.load($('#templatevalues').val())),
            }
        }).done(function (response) {
            fktask = response['pkid']
            var $toast = basecoat.toast('<span class="fa fa-check"></span>Bootstrap config <a href="/settings/bootstrapconfig/' + fktask + '">' + fktask.substring(0,5) + '</a> created', 'success');
            $toast.trigger('show'); // show toast for 5s
        }).fail(function (response) {
            var $toast = basecoat.toast('<span class="fa fa-exclamation-triangle"></span>' + response.responseText, 'danger');
            $toast.trigger('show'); // show toast for 5s
        });
    });
</script>
{% endblock %}
