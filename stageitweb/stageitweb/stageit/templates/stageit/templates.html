{% extends "stageit/layout.html" %}

{% block title %}Templates{% endblock %}
{% block header %}Templates{% endblock %}

{% block body %}
<header class="jumbotron">
    <div class="container-lg">
        <div class="row">
            <div class="col-xs-12">
                <h2>Templates</h2>
            </div>
        </div>
    </div>
</header>

<div class="content-area">
    <div class="container-lg">
        <div class="row">
            <div class="col-xs-12">
                <table id="templates" class="table" width="100%">
            </div>
        </div>
    </div>
</div>


{% endblock %}

{% block script %}
<script>

    $(document).ready(function () {
        var dataSet = $.getJSON({
            url: '/api/tables?table=templates',
            async: false
        }).responseJSON.data;

        dataSet.forEach(function (element){
            var link = "<a href='/templates/" + element[0] + "'>" + element[0].substring(0,5) + "</a>"
            element.splice(1, 0, link);
        });


        $('#templates').DataTable({
            data: dataSet,
            rowId: 'pkid',
            columns: [
                { title: "pkid" },
                { title: "ID" },
                { title: "Name" },
                { title: "Description" }
            ],
            columnDefs: [
                {
                    "targets": [0],
                    "visible": false,
                    "searchable": false
                }]
        });
    });

    $('#deletetemplate').on('click', function (event) {
        var a = confirm("Confirm deletion");
        if (a == true) {
            $.ajax({
                type: 'DELETE',
                url: "/api/templates/" + $(this).attr("templateid"),
            }).done(function (response) {
                location.reload();
            }).fail(function (response) {
                alert(response.responseJSON.message)
            })
        }
    });

</script>
{% endblock %}
