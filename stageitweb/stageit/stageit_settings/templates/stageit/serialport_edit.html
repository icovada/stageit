{% extends "stageit/layout.html" %}

{% load crispy_forms_tags %}
{% load crispy_forms_field %}

{% block body %}
<div class="top-gutter bottom-gutter container-wrapper">
    <div class="content-area">
        <div class="container-lg">
            <form method="post" id="templateform" action="/api/serialport/?format=json">
                {% csrf_token %}
                {% crispy form %}

            </form>
            <hr class="mb-4">
            <button class="btn btn-primary btn-lg btn-block" type="submit" onclick="jsonsubmit()">Save template</button>


        </div>
    </div>
</div>

{% endblock %}


{% block script %}
<script>
    function jsonsubmit() {
        frm = $("#templateform");
        $.ajax({
            type: 'POST',
            url: $('#templateform').attr('action'),
            data: serializeFormJSON(frm)
        }).done(function (response) {
            var $toast = basecoat.toast('<span class="fa fa-check"></span>Port submitted', 'success');
            $toast.trigger('show', [5000]); // show toast for 5s
            window.location.href = "/settings/serialport"
        }).fail(function (response) {
            var $toast = basecoat.toast(
                '<span class="fa fa-exclamation-triangle"></span>There was an error submitting your request', 'warning');
            $toast.trigger('show', [5000]); // show toast for 5s
        });
    };
</script>
{% endblock %}
