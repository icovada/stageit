{% extends "stageit/layout.html" %}

{% load crispy_forms_tags %}
{% load crispy_forms_field %}

{% block body %}
<div class="top-gutter bottom-gutter container-wrapper">
    <div class="content-area">
        <div class="container-lg">
            <form method="post" id="templateform" action="/api/terminalserver/?format=json">
                {% csrf_token %}
                {% crispy form %}

            </form>
            <hr class="mb-4">
            <button class="btn btn-primary btn-lg btn-block" type="submit" onclick="jsonsubmit()">Save template</button>


        </div>
    </div>
</div>

{% endblock %}


{% block script %}
<script>
    function jsonsubmit() {
        var frm = $("#templateform");
        var dat = JSON.stringify(frm.serializeArray()[0]);
        $.ajax({
            type: 'POST',
            url: $('#templateform').attr('action'),
            data: dat
        }).done(function (response) {
            var $toast = basecoat.toast('<span class="fa fa-check"></span>Task submitted', 'success')
                .trigger('show');
            $toast.trigger('show', [5000]); // show toast for 5s
        }).fail(function (response) {
            var $toast = basecoat.toast(
                '<span class="fa fa-times"></span>There was an error submitting your template',
                'warning').trigger('show');
            $toast.trigger('show', [5000]); // show toast for 5s
        });
    };
</script>
{% endblock %}
