{% extends "stageit/layout.html" %}

{% block title %}Task History{% endblock %}
{% block header %}Task History{% endblock %}

{% block body %}
<header class="jumbotron">
    <div class="container-lg">
        <div class="row">
            <div class="col-xs-12">
                <h2>History</h2>
            </div>
        </div>
    </div>
</header>
<div class="content-area">
    <div class="container-lg">
        <div class="row">
            <div class="col-xs-12">
                <table id="tasks" class="table" width="100%">
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block script %}
<script>

    $(document).ready(function () {
        var dataSet = $.getJSON({
            url: '/api/history?format=json',
            async: false
        }).responseJSON;

        dataSet.forEach(function (element) {
            element['ID'] = "<a href='/history/" + element['pkid'] + "'>" + element['pkid'].substring(0, 5) + "</a>"
            if (element['status'] == 'In Progress') {
                element['status'] = '<span class="label label-info">In Progress</strong></span>'
            } else if (element['status'] == 'Success') {
                element['status'] = '<span class="label label-success">Success</strong></span>'
            } else if (element['status'] == 'Fail') {
                element['status'] = '<span class="label label-danger">Fail</strong></span>'
            } else if (element['status'] == 'Queued') {
                element['status'] = '<span class="label label-warning">Queued</strong></span>'
            }
        });


        $('#tasks').DataTable({
            data: dataSet,
            rowId: 'pkid',
            columns: [
                { title: "pkid", data: 'pkid' },
                { title: "ID", data: 'ID' },
                { title: "Serial Number", data: 'serial_number' },
                { title: "Status", data: 'status' }
            ],
            columnDefs: [
                {
                    "targets": [0],
                    "visible": false,
                    "searchable": false
                }]
        });
    });

</script>
{% endblock %}
